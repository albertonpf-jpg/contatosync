<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContatoSync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a0a; 
            color: white; 
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #25d366; margin-bottom: 30px; text-align: center; }
        .section { 
            background: #1a1a1a; 
            border-radius: 10px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid #333;
        }
        .section h2 { color: #25d366; margin-bottom: 15px; }
        button { 
            background: #25d366; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover { background: #1ea952; }
        button:disabled { background: #666; cursor: not-allowed; }
        .status { 
            padding: 10px; 
            border-radius: 5px; 
            margin: 10px 0; 
        }
        .status.success { background: #25d366; }
        .status.error { background: #e74c3c; }
        .status.info { background: #3498db; }
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #555; 
            background: #2a2a2a; 
            color: white; 
            border-radius: 5px; 
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ContatoSync</h1>
        
        <div class="section">
            <h2>📱 WhatsApp</h2>
            <p>Conectar WhatsApp para sincronizar contatos</p>
            <div id="whatsapp-status" class="status info">Backend online - Pronto para conectar</div>
            <button id="connect-whatsapp">Conectar WhatsApp</button>
            <button id="disconnect-whatsapp" disabled>Desconectar WhatsApp</button>
            <div id="qr-code" style="margin-top: 20px;"></div>
        </div>

        <div class="section">
            <h2>📒 Agendas</h2>
            <div>
                <h3>🇬 Google Contacts</h3>
                <div id="google-status" class="status info">Desconectado</div>
                <button id="connect-google">Entrar com Google</button>
                <button id="disconnect-google" disabled>Desconectar Google</button>
            </div>
        </div>

        <div class="section">
            <h2>✏️ Configurações</h2>
            <label>Prefixo dos contatos:</label>
            <input type="text" id="contact-prefix" value="Contato Zap" placeholder="Ex: Contato Zap">
            <button id="save-config">Salvar Configuração</button>
        </div>

        <div class="section">
            <h2>👥 Contatos Salvos</h2>
            <div id="contacts-list">
                <p>Nenhum contato salvo ainda. Conecte o WhatsApp para começar!</p>
            </div>
        </div>
    </div>

    <script>
        // Backend check que sempre funciona
        async function checkBackend() {
            try {
                const response = await fetch('/health');
                if (response.ok) {
                    document.getElementById('whatsapp-status').innerHTML = '✅ Backend online - Pronto para usar!';
                    document.getElementById('whatsapp-status').className = 'status success';
                    return true;
                }
            } catch (error) {
                console.log('Backend check error:', error);
            }
            document.getElementById('whatsapp-status').innerHTML = '🔄 Backend inicializando...';
            return false;
        }

        // Conectar WhatsApp
        document.getElementById('connect-whatsapp').addEventListener('click', async () => {
            const status = document.getElementById('whatsapp-status');
            status.innerHTML = '🔄 Conectando WhatsApp...';
            status.className = 'status info';
            
            try {
                const response = await fetch('/whatsapp/connect', { method: 'POST' });
                const result = await response.json();
                
                if (result.ok) {
                    status.innerHTML = '✅ WhatsApp conectado com sucesso!';
                    status.className = 'status success';
                    document.getElementById('connect-whatsapp').disabled = true;
                    document.getElementById('disconnect-whatsapp').disabled = false;
                } else {
                    status.innerHTML = '⚠️ Erro ao conectar: ' + (result.error || 'Módulo em desenvolvimento');
                    status.className = 'status error';
                }
            } catch (error) {
                status.innerHTML = '⚠️ Erro de conexão: Módulo WhatsApp em configuração';
                status.className = 'status error';
            }
        });

        // Google Contacts
        document.getElementById('connect-google').addEventListener('click', () => {
            window.open('/auth/google', '_blank');
        });

        // Salvar configuração
        document.getElementById('save-config').addEventListener('click', async () => {
            const prefix = document.getElementById('contact-prefix').value;
            // Salva localmente por enquanto
            localStorage.setItem('contactPrefix', prefix);
            alert('Configuração salva: ' + prefix);
        });

        // Carregar configurações
        const savedPrefix = localStorage.getItem('contactPrefix') || 'Contato Zap';
        document.getElementById('contact-prefix').value = savedPrefix;

        // Check inicial do backend
        checkBackend();
        
        // Check periódico
        setInterval(checkBackend, 30000); // A cada 30 segundos
    </script>
</body>
</html>
